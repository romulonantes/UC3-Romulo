{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pé Confortável Ltda.</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'loja/img/tenisfavicon.png' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'loja/css/style.css' %}">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'index' %}">Pé Confortável</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuSite">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuSite">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'index' %}">Início</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'lista_produtos' %}">Lista de Produtos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'cadastro_produto' %}">Cadastro de Produtos</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'lista_fabricantes' %}">Lista de Fabricantes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'cadastro_fabricante' %}">Cadastro de Fabricantes</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'contato' %}">Contato SAC</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container py-4">
    {% block conteudo %}
    {% endblock %}
</main>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">Pé Confortável Ltda. &copy; 2026</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
