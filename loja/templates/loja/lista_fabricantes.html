{% extends 'loja/base.html' %}
{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Lista de Fabricantes</h2>
    <a class="btn btn-primary" href="{% url 'cadastro_fabricante' %}">Novo Fabricante</a>
</div>
<table class="table table-striped table-bordered">
    <thead class="table-dark"><tr><th>Código</th><th>Nome</th></tr></thead>
    <tbody>
    {% for fabricante in fabricantes %}
        <tr><td>{{ fabricante.id }}</td><td>{{ fabricante.nome }}</td></tr>
    {% empty %}
        <tr><td colspan="2">Nenhum fabricante cadastrado.</td></tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
