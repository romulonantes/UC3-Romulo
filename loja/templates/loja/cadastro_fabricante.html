{% extends 'loja/base.html' %}
{% block conteudo %}
<h2>Cadastro de Fabricante</h2>
<form id="idFrmCadastroFabricante" name="frmCadastroFabricante" method="post" class="card p-4 shadow-sm">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">Nome do Fabricante</label>
        {{ form.nome }}
        {{ form.nome.errors }}
    </div>
    <input type="submit" id="idBtnSalvarFabricante" name="salvarFabricante" value="Salvar" class="btn btn-success">
    <input type="reset" id="idBtnLimparFabricante" name="limparFabricante" value="Limpar" class="btn btn-secondary mt-2">
</form>
{% endblock %}
